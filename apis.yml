aid: level-ai
name: Level AI
description: >-
  Level AI (legally Ujwal Inc.) is a Mountain View, California contact center
  AI company founded in 2019 by Ashish Nagar, a former member of Amazon's
  Alexa conversational AI team. The company builds LLM-native customer
  experience intelligence and service automation for enterprise contact
  centers, with a platform spanning two product surfaces: a CX Delivery suite
  (AI Virtual Agent, Agent Assist, AgentGPT, Coaching, Manager Assist,
  Knowledge Bot, Auto Summary, Agent Screen Recording) and a CX Strategy
  suite (Auto-QA on 100% of interactions, Voice of the Customer theme
  detection, omnichannel Analytics, iCSAT, AI Workers). The proprietary
  full-stack AI platform includes Level AI's own ASR/Voice AI and
  semantic-intelligence layer trained on customer-service data, and is
  positioned for financial services, insurance, healthcare, retail,
  banking, and collections operations. Level AI exposes a public REST API
  for bidirectional data exchange with BI tools and existing contact
  center stacks, and ships native integrations across telephony, CRM,
  customer support, workforce management, CX management, communication,
  learning management, and SSO categories. The company has raised
  $73.1M to date (Series A 2021, Series B 2022 led by Battery Ventures,
  Series C $39.4M 2024 led by Adams Street Partners with Cross Creek,
  Brightloop, Battery Ventures and Eniac Ventures), holds a 4.7/5 rating
  on G2, and reports customer outcomes including 25% CSAT lift, 45% agent
  satisfaction improvement, and 90% time savings on manual QA. The Level
  AI GitHub organization (github.com/Level-AI) exists but is currently
  empty — there is no public OpenAPI specification, public SDK, or
  open-source release; the API is documented and credentialed through
  the customer's tenant of the Level AI platform.
